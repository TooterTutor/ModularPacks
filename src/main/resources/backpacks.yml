# CraftingRecipe supports either:
# 1) Single recipe (old format):
#    CraftingRecipe:
#      Type: Crafting
#      Pattern: ["III","IBI","III"]
#      Ingredients: { I: IRON_INGOT, B: BACKPACK:Leather }
#
# 2) Multiple alternative recipes (list-of-maps format):
#    CraftingRecipe:
#      - "1": { Type: Crafting, Pattern: [...], Ingredients: {...} }
#      - "2": { Type: Crafting, Pattern: [...], Ingredients: {...} }
BackpackTypes:
  Leather:
    Rows: 2
    UpgradeSlots: 1
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - "SLS"
        - "WCW"
        - "LLL"
      Ingredients:
        L: LEATHER
        S: STRING
        C: CHEST
        W: WHITE_WOOL
      OutputMaterial: PLAYER_HEAD
    DisplayName: "&6Leather Backpack"
    Lore:
      - "&7Leather Backpack that can carry 2 rows of items."
      - "{backpackContents}"
      - "{backpackId}"
      - "{installedModules}"
    CustomModelData: 1001
    DefaultColor: 11100488
    SkullData: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNDBiMWI1MzY3NDkxODM5MWEwN2E5ZDAwNTgyYzA1OGY5MjgwYmM1MjZhNzE2Yzc5NmVlNWVhYjRiZTEwYTc2MCJ9fX0=
