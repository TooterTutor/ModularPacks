# Modularpacks is an unofficial port of the Sophisticated Backpacks mod for Paper servers created by TooterTutor.
modularpacks:
  Enabled: true

  # When enabled, ModularPacks will mount an invisible armor stand with the Backpack model on the player's back when
  # they are wearing a backpack, allowing for a custom 3D model to be rendered in place of the player's chestplate.
  # This may have a small performance impact, but allows for much greater visual customization of backpacks.
  RenderModel: true
  # Criteria used to decide when the wearable backpack model should be hidden.
  # Valid values:
  # - NONE: Always render (unless other hard states disable rendering).
  # - EXACT_PITCH: Hide when player pitch matches DisablePitchMin (within ~0.5 degrees).
  # - PITCH: Hide when absolute pitch is in the window [DisablePitchMin, DisablePitchMax].
  RenderCriteria: NONE
  # Minimum pitch angle where backpack rendering should be disabled.
  DisablePitchMin: 22.5
  # Maximum pitch angle where backpack rendering should be disabled.
  DisablePitchMax: -50.0

  UpdateChecker:
    Enabled: true
    # When true, logs the changelog of the new version in console and to those who have permission in chat when an update is found.
    ShowChangeLog: true
    # When true, checks for updates on the Github repository page and logs a message in console if a new version is available.
    CheckOnStartup: true
    # When true, also checks for updates while the server is running.
    PeriodicCheck: true
    # If PeriodicCheck is true, the interval (in hours) between update checks.  Default is 24 for once-daily checks.
    CheckIntervalHours: 24
    # Players with this permission will be notified in chat when an update is found.
    NotifyPermission: modularpacks.update.notify
    # GitHub API endpoint used to fetch latest release metadata.
    ReleaseApiUrl: https://api.github.com/repos/tootertutor/ModularPacks/releases/latest

  # ResizeGUI: When false, keeps the backpack pages at a fixed GUI size. When true, makes the backpacks dynamically resize the GUI pages.
  ResizeGUI: true
  AutoCloseOnTeleport: true

  Debug:
    # When true, logs Backpack/Module inventory click+drag events to `plugins/modularpacks/click-events.log`
    ClickLog: false

  # Backpack Sound Effects
  BackpackOpenSound: CHEST_OPEN
  BackpackCloseSound: CHEST_CLOSE

  # Shulker & Bundle Settings
  AllowShulkerBoxes: false
  AllowBundles: false

  # Prevent specific item types from being inserted into backpacks (Magnet respects this).
  # Example:
  # BackpackInsertBlacklist:
  #   - BEDROCK
  #   - SHULKER_BOX
  BackpackInsertBlacklist: []

  # PersistentDataContainer (PDC) namespace for marking GUI menu items.
  # This is used to tag items (nav buttons, borders, slot markers) in GUIs
  # so they can be identified and their data can be persisted.
  PDCNamespace: "modularpacks"

  # GUI Materials
  NavPageButtons: ARROW
  NavBorderFiller: GRAY_STAINED_GLASS_PANE
  UnlockedUpgradeSlotMaterial: WHITE_STAINED_GLASS_PANE
  LockedUpgradeSlotMaterial: IRON_BARS

  # Placeable Backpacks
  # Whether backpacks can be placed as blocks in the world by shift-right-clicking.
  Placeable: true
  # Whether placed backpacks should drop their items when destroyed by explosions.
  # If false, they are protected from explosions.
  DropPlacedBackpacksOnExplosion: false

  # World render transform for placed backpack ItemDisplays.
  # Offset is relative to block origin (0,0,0 = lower northwest corner).
  # Rotation is in degrees around the local X/Y/Z axes and is applied in addition
  # to the block's facing rotation.
  # Scale uses 1.0 as vanilla size.
  PlacedBackpackRender:
    Offset:
      X: 0.5
      Y: 0.4
      Z: 0.4
    Rotation:
      X: 0.0
      Y: 0.0
      Z: 0.0
    Scale:
      X: 1.0
      Y: 1.0
      Z: 1.0

  # Shared Backpack Settings
  SharedBackpacks:
    Enabled: true
    # Maximum number of players that can share a single backpack.
    MaxSharedUsers: 5
