    CustomModelData: 2008

  Smoking:
    Enabled: true
    Toggleable: false
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " C "
        - "LTL"
        - " S "
      Ingredients:
        C: CRAFTING_TABLE
        L: LEATHER
        T: MODULE:CraftingTemplate
        S: SMOKER
      OutputMaterial: SMOKER
      Glint: true
    DisplayName: "&eSmoking Upgrade"
    Lore:
      - "&7A portable Smoking."
      - "{moduleActions}"
    CustomModelData: 2009

  Stonecutter:
    Enabled: true
    Toggleable: false
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " C "
        - "BTB"
        - " S "
      Ingredients:
        C: CRAFTING_TABLE
        B: BRICKS
        T: MODULE:CraftingTemplate
        S: STONECUTTER
      OutputMaterial: STONECUTTER
      Glint: true
    DisplayName: "&eStonecutting Upgrade"
    Lore:
      - "&7A portable Stonecutter."
      - "{moduleActions}"
    CustomModelData: 2010

  Anvil:
    Enabled: true
    Toggleable: false
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " C "
        - "ITI"
        - " A "
      Ingredients:
        C: CRAFTING_TABLE
        I: IRON_BLOCK
        T: MODULE:CraftingTemplate
        A: ANVIL
      OutputMaterial: ANVIL
      Glint: true
    DisplayName: "&eAnvil Upgrade"
    Lore:
      - "&7A portable Anvil."
      - "{moduleActions}"
    CustomModelData: 2011

  Smithing:
    Enabled: true
    Toggleable: false
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " C "
        - "PTP"
        - " S "
      Ingredients:
        C: CRAFTING_TABLE
        P: PAPER
        T: MODULE:CraftingTemplate
        S: SMITHING_TABLE
      OutputMaterial: SMITHING_TABLE
      Glint: true
    DisplayName: "&eSmithing Upgrade"
    Lore:
      - "&7A portable Smithing Table."
      - "{moduleActions}"
    CustomModelData: 2012

  Jukebox:
    Enabled: true
    Toggleable: true
    SecondaryAction: true
    # Playback config:
    # - Mode: Shuffle | RepeatOne | RepeatAll
    # - TrackDurationTicks: Approximate duration before advancing (vanilla disc lengths vary)
    Mode: RepeatAll
    TrackDurationTicks: 2400
    Volume: 1.0
    Pitch: 1.0
    HearRadius: 32.0
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " D "
        - "PTP"
        - " J "
      Ingredients:
        D: DROPPER
        P: OAK_PLANKS
        T: MODULE:CraftingTemplate
        J: JUKEBOX
      OutputMaterial: JUKEBOX
      Glint: true
    DisplayName: "&eJukebox Upgrade"
    Lore:
      - "&7A portable Jukebox."
      - "{toggleState}"
      - "{jukeboxMode}"
      - "{moduleActionsJukebox}"
    CustomModelData: 2013

  Restock:
    Enabled: true
    Toggleable: true
    SecondaryAction: true
    # Restock behavior tuning
    RestockThreshold: 16
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " E "
        - "RTR"
        - " E "
      Ingredients:
        E: EMERALD
        R: REDSTONE
        T: MODULE:CraftingTemplate
      OutputMaterial: EMERALD
      Glint: true
    DisplayName: "&aRestock Upgrade"
    Lore:
      - "&7Automatically restocks the Player's inventory."
      - "{toggleState}"
      - "{restockThreshold}"
      - "{moduleActionsRestock}"
    CustomModelData: 2014

  Autocrafting:
    Enabled: true
    Toggleable: true
    SecondaryAction: false
    # Autocrafting behavior tuning
    CraftingIntervalTicks: 120
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " L "
        - "RTR"
        - " C "
      Ingredients:
        L: LEVER
        R: REDSTONE
        T: MODULE:Crafting
        C: CRAFTER
      OutputMaterial: CRAFTER
      Glint: true
    DisplayName: "&eAutocrafter Upgrade"
    Lore:
      - "&7A portable autocrafter."
      - "{toggleState}"
      - "{moduleActionsAutocrafting}"
    CustomModelData: 2015

  ExperienceTank:
    Enabled: true
    Toggleable: true
    SecondaryAction: true
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " E "
        - "BTB"
        - " E "
      Ingredients:
        E: EXPERIENCE_BOTTLE
        B: GLASS_BOTTLE
        T: MODULE:CraftingTemplate
      OutputMaterial: EXPERIENCE_BOTTLE
      Glint: true
    DisplayName: "&aExperience Tank Upgrade"
    Lore:
      - "&7Stores and dispenses player experience."
      - "{toggleState}"
      - "{moduleActionsExperienceTank}"
      - "{containedFluid}"
    CustomModelData: 2016

  Pump:
    Enabled: true
    Toggleable: true
    SecondaryAction: true
    # Mode: Deposit or Withdraw
    Mode: Deposit
    IntervalTicks: 10
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " C "
        - "PTP"
        - " R "
      Ingredients:
        C: COPPER_INGOT
        P: PISTON
        T: MODULE:CraftingTemplate
        R: REDSTONE
      OutputMaterial: PISTON
      Glint: true
    DisplayName: "&bPump Upgrade"
    Lore:
      - "&7Pumps fluids between your inventory and Fluid Tank."
      - "{toggleState}"
      - "{pumpMode}"
      - "{moduleActionsPump}"
    CustomModelData: 2017

  ExpPump:
    Enabled: true
    Toggleable: true
    SecondaryAction: true
    # Mode: Deposit, Withdraw, or KeepLevel
    Mode: Deposit
    TargetLevel: 30
    # When true, withdrawn XP repairs equipped Mending items before giving leftover XP to levels.
    MendEquippedItems: false
    # Max XP points spent on mending per ExpPump cycle to keep repairs gradual.
    MendingXpPerTick: 2
    # Max displayed levels moved toward target per ExpPump cycle in KeepLevel mode.
    KeepLevelLevelsPerTick: 1
    IntervalTicks: 40
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " E "
        - "PTP"
        - " R "
      Ingredients:
        E: EXPERIENCE_BOTTLE
        P: PISTON
        T: MODULE:CraftingTemplate
        R: REDSTONE
      OutputMaterial: EXPERIENCE_BOTTLE
      Glint: true
    DisplayName: "&aExp Pump Upgrade"
    Lore:
      - "&7Pumps XP between player and Experience Tank."
      - "{toggleState}"
      - "{pumpMode}"
      - "{expPumpMending}"
      - "{moduleActionsExpPump}"
    CustomModelData: 2018
