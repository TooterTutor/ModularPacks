        L: LEATHER
        T: MODULE:CraftingTemplate
        F: FURNACE
      OutputMaterial: FURNACE
      Glint: true
    DisplayName: "&eSmelting Upgrade"
    Lore:
      - "&7A portable Furnace."
      - "{moduleActions}"
    CustomModelData: 2007

  Blasting:
    Enabled: true
    Toggleable: false
    CraftingRecipe:
      Type: Crafting
