# CraftingRecipe.Ingredients supports vanilla materials (e.g. `IRON_INGOT`) AND special ModularPacks tokens:
# - `BACKPACK:<TypeId>` or `<TYPE>_BACKPACK` (e.g. `BACKPACK:Leather`, `DIAMOND_BACKPACK`) to require a ModularPacks backpack item
# - `MODULE:<UpgradeId>` / `UPGRADE:<UpgradeId>` to require a ModularPacks module item

Upgrades:
  # Utility upgrades provide various useful features to backpacks.
  CraftingTemplate:
    Enabled: true
    Toggleable: false
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - "SIS"
        - "ILI"
        - "SIS"
      Ingredients:
        S: STRING
        I: IRON_INGOT
        L: LEATHER
      OutputMaterial: ITEM_FRAME
      Glint: true
    DisplayName: "&eModule Template"
    Lore:
      - "&7Base template required to craft backpack upgrades."
    CustomModelData: 3001

  Everlasting:
    Enabled: true
    Toggleable: false
    # Type of screen to open when clicking on the upgrade in the backpack GUI.
    # Crafting Recipe for the upgrade
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " N "
        - "NTN"
        - " N "
      Ingredients:
        N: NETHER_STAR
        T: MODULE:CraftingTemplate
      OutputMaterial: NETHER_STAR
      Glint: true
    DisplayName: "&bEverlasting Upgrade"
    Lore:
      - "&7Makes the backpack fully indestructible."
      - "{moduleActionsEverlasting}"
    CustomModelData: 2001

  Magnet:
    Enabled: true
    Toggleable: true
    # Type of screen to open when clicking on the upgrade in the backpack GUI.
    # Magnet behavior tuning
    Range: 6.0
    MaxItemsPerTick: 32
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - "L R"
        - "ITI"
        - "III"
      Ingredients:
        L: LAPIS_LAZULI
        R: REDSTONE
        I: IRON_INGOT
        T: MODULE:CraftingTemplate
      OutputMaterial: LEVER
      Glint: true
    DisplayName: "&aMagnet Upgrade"
    Lore:
      - "&7Automatically picks up items in a radius of the backpack."
      - "{toggleState}"
      - "{moduleActions}"
      - "{magnetRange}"
    CustomModelData: 2002

  FluidTank:
    Enabled: true
    Toggleable: true
    SecondaryAction: false
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " B "
        - "WTL"
        - " B "
      Ingredients:
        W: WATER_BUCKET
        T: MODULE:CraftingTemplate
        L: LAVA_BUCKET
        B: BUCKET
      OutputMaterial: BUCKET
      Glint: true
    DisplayName: "&bFluid Tank Upgrade"
    Lore:
      - "&7Allows fluids to be stored."
      - "{toggleState}"
      - "{moduleActionsFluidTank}"
      - "{containedFluid}"
    CustomModelData: 2003

  Tank:
    Enabled: false
    Toggleable: true
    SecondaryAction: true
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " E "
        - "WTL"
        - " B "
      Ingredients:
        E: EXPERIENCE_BOTTLE
        W: WATER_BUCKET
        T: MODULE:CraftingTemplate
        L: LAVA_BUCKET
        B: BUCKET
      OutputMaterial: BUCKET
      Glint: true
    DisplayName: "&bTank Upgrade (Legacy)"
    Lore:
      - "&7Legacy mixed tank module."
      - "{toggleState}"
      - "{moduleActionsTank}"
      - "{containedFluid}"
    CustomModelData: 2003

  Feeding:
    Enabled: true
    Toggleable: true
    SecondaryAction: true
    # Feeding behavior tuning
    MinFoodLevel: 18
    CooldownTicks: 20
    # SelectionMode: BestCandidate or WhitelistOrder
    SelectionMode: BestCandidate
    # Preference: Nutrition or Effects (harmful foods last)
    Preference: Nutrition
    # Debug feeding math/selection in console
    Debug: false
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " I "
        - "ATC"
        - " G "
      Ingredients:
        I: GOLD_INGOT
        A: GOLDEN_APPLE
        T: MODULE:CraftingTemplate
        C: GOLDEN_CARROT
        G: GLISTERING_MELON_SLICE
      OutputMaterial: GOLDEN_CARROT
      Glint: true
    DisplayName: "&3Feeding Upgrade"
    Lore:
      - "&7Automatically feeds the Player when hungry."
      - "{toggleState}"
      - "{feedingMode}"
      - "{moduleActionsFeeding}"
    CustomModelData: 2004

  Void:
    Enabled: true
    Toggleable: true
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " R "
        - "OTO"
        - " E "
      Ingredients:
        R: REDSTONE
        O: OBSIDIAN
        T: MODULE:CraftingTemplate
        E: ENDER_PEARL
      OutputMaterial: ENDER_EYE
      Glint: true
    DisplayName: "&8Void Upgrade"
    Lore:
      # - "&7Voids all the hungry."
      - "&7Voids all filtered items."
      - "{toggleState}"
      - "{moduleActions}"
    CustomModelData: 2005

  # Workstation upgrades allow opening various crafting/smelting/etc., interfaces directly from the backpack.
  Crafting:
    Enabled: true
    Toggleable: false
    Pattern:
    CraftingRecipe:
      Type: Crafting
      Pattern:
        - " L "
        - "CTC"
        - " B "
      Ingredients:
        L: LEATHER
        B: CRAFTING_TABLE
        T: MODULE:CraftingTemplate
        C: CHEST
      OutputMaterial: CRAFTING_TABLE
      Glint: true
    DisplayName: "&eCrafting Upgrade"
    Lore:
      - "&7A portable Workbench."
      - "{moduleActions}"
    CustomModelData: 2006

  Smelting:
