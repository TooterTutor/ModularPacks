        - " F "
      Ingredients:
        C: CRAFTING_TABLE
        L: LEATHER
        T: MODULE:CraftingTemplate
        F: BLAST_FURNACE
      OutputMaterial: BLAST_FURNACE
      Glint: true
    DisplayName: "&eBlasting Upgrade"
    Lore:
      - "&7A portable Blast Furnace."
